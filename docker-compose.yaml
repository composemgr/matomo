# nginx proxy address - http://172.17.0.1:59070

name: matomo
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  app:
    image: bitnami/matomo:latest
    container_name: matomo-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: matomo-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
      MATOMO_DEFAULT_DATABASE_HOST: matomo-db
      MATOMO_DATABASE_HOST: matomo-db
      MATOMO_DATABASE_USER: ${DB_USER_NAME:-matomo}
      MATOMO_DATABASE_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      MATOMO_DATABASE_NAME: ${DB_CREATE_DATABASE_NAME:-matomo}
      MATOMO_DATABASE_PORT_NUMBER: 3306
      MATOMO_PROXY_HOST_HEADER: HTTP_X_FORWARDED_HOST
      MATOMO_PROXY_CLIENT_HEADER: HTTP_X_FORWARDED_FOR
      MATOMO_ENABLE_ASSUME_SECURE_PROTOCOL: yes
      MATOMO_ENABLE_FORCE_SSL: yes
      MATOMO_ENABLE_PROXY_URI_HEADER: yes
      MATOMO_USERNAME: ${APP_ADMIN_USER:-administrator}
      MATOMO_PASSWORD: ${APP_ADMIN_PASS:-changeme_admin_password}
      MATOMO_EMAIL: ${APP_ADMIN_USER:-administrator}@${BASE_DOMAIN_NAME:-example.com}
      MATOMO_HOST: ${BASE_HOST_NAME:-$HOSTNAME}
      MATOMO_WEBSITE_NAME: ${APP_ORG_NAME:-My Site}
      MATOMO_ENABLE_TRUSTED_HOST_CHECK: no
      MATOMO_SMTP_HOST: ${EMAIL_SERVER_HOST:-172.17.0.1}
      MATOMO_SMTP_PORT_NUMBER: ${EMAIL_SERVER_PORT:-587}
      MATOMO_NOREPLY_NAME: ${EMAIL_SERVER_FROM_ORG:-Matomo}
      MATOMO_NOREPLY_ADDRESS: ${EMAIL_SERVER_MAIL_FROM:-no-reply@example.com}
    ports:
      - '172.17.0.1:59070:8080'
    volumes:
      - './volumes/data/matomo:/bitnami/matomo'
    depends_on:
      db:
        condition: service_healthy
    networks:
      - matomo
      - proxy
      - cloudflare
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://matomo-app:8080'
      - 'cloudflare.hostname=matomo.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.matomo-app.entrypoints=http'
      - 'traefik.http.routers.matomo-app-secure.tls=true'
      - 'traefik.http.routers.matomo-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.matomo-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.matomo-app.middlewares=matomo-app-https-redirect'
      - 'traefik.http.routers.matomo-app-secure.entrypoints=https'
      - 'traefik.http.routers.matomo-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.matomo-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.matomo-app-secure.service=matomo-app'
      - 'traefik.http.services.matomo-app.loadbalancer.server.port=8080'

  db:
    image: bitnami/mariadb:latest
    container_name: matomo-db
    hostname: matomo-db
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: matomo-db
      MARIADB_USER: ${DB_USER_NAME:-matomo}
      MARIADB_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      MARIADB_DATABASE: ${DB_CREATE_DATABASE_NAME:-matomo}
      MARIADB_ROOT_PASSWORD: ${DB_ADMIN_PASS:-changeme_admin_password}
      MARIADB_EXTRA_FLAGS: --max_allowed_packet=2048MB
    volumes:
      - './volumes/data/db/mariadb/matomo:/bitnami/mariadb'
    healthcheck:
      test:
        [
          'CMD',
          'healthcheck.sh',
          '--su-mysql',
          '--connect',
          '--innodb_initialized',
        ]
      start_period: 1m
      start_interval: 10s
      interval: 1m
      timeout: 5s
      retries: 3
    networks:
      - matomo

networks:
  matomo:
    name: matomo
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
